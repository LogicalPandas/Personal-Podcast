name: Generate Daily Podcast

on:
  schedule:
    - cron: '0 9 * * *' # 09:00 UTC
  workflow_dispatch: # Enable manual run
    inputs:
      run_test:
        description: 'Run with mock test data (ignore RSS feed)'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y espeak-ng ffmpeg

      - name: Restore Kokoro voice model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-kokoro-model
          restore-keys: |
            ${{ runner.os }}-kokoro-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RSS_FEED_URL: ${{ secrets.RSS_FEED_URL }}
          GITHUB_PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        run: |
          if [ "${{ github.event.inputs.run_test }}" == "true" ]; then
            python main.py --local-test
          else
            python main.py
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "chore: add daily podcast episode and update feed" || exit 0
          git push
